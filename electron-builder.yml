appId: com.ethcoin.miner
productName: Ethcoin Miner
artifactName: "Ethcoin-Miner-${version}-${arch}.${ext}"
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
extraResources:
  - from: resources/icon.png
    to: icon.png
publish:
  provider: github
  owner: ape-fi
  repo: ethcoin-client
mac:
  target:
    - dmg
    - zip
  category: public.app-category.finance
  notarize: true
win:
  target: nsis
linux:
  target: AppImage
